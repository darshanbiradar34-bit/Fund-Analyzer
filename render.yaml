services:
  - type: web
    name: the-desk-analyzer
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: ANTHROPIC_API_KEY
        sync: false  # set this manually in Render's dashboard - don't commit real keys to git
